version: '3.8'

services:
  db:
    image: postgres:15
    container_name: deribit_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: deribit_redis
    restart: always

  api:
    build: .
    container_name: deribit_api
    # Добавляем PYTHONPATH=. перед командой
    environment:
      - PYTHONPATH=.
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    build: .
    container_name: deribit_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env

  beat:
    build: .
    container_name: deribit_beat
    command: celery -A app.tasks.celery_app worker --loglevel=info

    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data: